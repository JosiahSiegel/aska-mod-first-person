name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aska First Person Camera v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          body: |
            ## Installation

            **r2modman (recommended):** Search for AskaFirstPerson in the Aska mod list.

            **Manual:** Download `AskaFirstPerson-${{ steps.version.outputs.version }}.zip`, extract, and copy `BepInEx/plugins/AskaFirstPerson/AskaFirstPerson.dll` to your Aska BepInEx plugins folder.

            **Nexus Mods:** Download `AskaFirstPerson.dll` and place it in `<Aska>/BepInEx/plugins/`.

            > [!NOTE]
            > Requires [BepInEx 6 IL2CPP (BE #755+)](https://builds.bepinex.dev/projects/bepinex_be). Install via r2modman for the easiest setup.
